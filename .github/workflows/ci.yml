name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dataco
          POSTGRES_PASSWORD: dataco_secret
          POSTGRES_DB: supplychain
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dataco:dataco_secret@localhost:5432/supplychain
          SYNC_DATABASE_URL: postgresql://dataco:dataco_secret@localhost:5432/supplychain
          MODEL_DIR: /tmp/models
          DATA_DIR: /tmp/data
        run: pytest backend/tests/ -v
        working-directory: .

  frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
