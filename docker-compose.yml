version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dataco
      POSTGRES_PASSWORD: dataco_secret
      POSTGRES_DB: supplychain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataco -d supplychain"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://dataco:dataco_secret@db:5432/supplychain
      SYNC_DATABASE_URL: postgresql://dataco:dataco_secret@db:5432/supplychain
      SECRET_KEY: changeme-in-production
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      - ./data:/data
      - model_store:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
  model_store:
